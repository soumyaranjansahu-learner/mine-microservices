{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-success fw-bolder"><i class="fas fa-headphones-alt me-2"></i>Mine Music Library</h2>
    <span class="badge bg-success rounded-pill px-3 py-2 fs-6">Microservice 3</span>
</div>

<div class="row mb-4">
    <div class="col-md-8 mb-2">
        <input type="text" id="searchInput" class="form-control rounded-pill border-success"
            placeholder="Search songs or artists..." oninput="handleSearch()">
    </div>
    <div class="col-md-4 mb-2">
        <select id="genreSelect" class="form-select rounded-pill border-success text-success fw-bold"
            onchange="handleSearch()">
            <option value="All">All Genres</option>
        </select>
    </div>
</div>


<div class="row">
    <!-- Main Player Column -->
    <div class="col-md-8 mb-4">
        <div class="card shadow-lg border-0 bg-dark text-white rounded-4 overflow-hidden">
            <div class="card-body p-5 text-center"
                style="background: linear-gradient(135deg, #1db954 0%, #191414 100%); min-height: 350px; display: flex; flex-direction: column; justify-content: center;">
                <h3 id="now-playing-title" class="fw-bolder mb-2">Select a Song</h3>
                <h5 id="now-playing-artist" class="text-light mb-4">to start streaming</h5>

                <div class="d-flex justify-content-center align-items-center gap-4 mb-3">
                    <button class="btn btn-link text-white fs-4" onclick="playPrevious()" title="Previous Song"><i
                            class="fas fa-step-backward"></i></button>
                    <button class="btn btn-link text-white fs-4" onclick="skipBackward()" title="Rewind 10s"><i
                            class="fas fa-undo"></i></button>

                    <button id="play-btn" class="btn btn-light rounded-circle p-4 fs-2 shadow play-btn-bounce" disabled>
                        <i class="fas fa-play text-success ms-1" id="play-icon"></i>
                    </button>

                    <button class="btn btn-link text-white fs-4" onclick="skipForward()" title="Fast Forward 10s"><i
                            class="fas fa-redo"></i></button>
                    <button class="btn btn-link text-white fs-4" onclick="playNext()" title="Next Song"><i
                            class="fas fa-step-forward"></i></button>
                </div>

                <!-- Progress Bar -->
                <div class="d-flex align-items-center gap-3 mt-3 w-100 px-3">
                    <span id="current-time" class="small text-muted" style="min-width: 45px;">0:00</span>
                    <input type="range" class="form-range flex-grow-1" id="progress-bar" min="0" max="100" value="0"
                        step="0.1" disabled>
                    <span id="total-time" class="small text-muted" style="min-width: 45px;">0:00</span>
                </div>

                <!-- Volume Control -->
                <div class="d-flex justify-content-end align-items-center gap-2 mt-3 w-100 pe-3">
                    <button class="btn btn-link text-muted p-0 fs-5" onclick="toggleMute()" id="mute-btn"><i
                            class="fas fa-volume-up"></i></button>
                    <input type="range" class="form-range" id="volume-slider" min="0" max="1" value="1" step="0.05"
                        style="width: 100px;">
                </div>
            </div>
            <!-- Hidden Audio Element -->
            <audio id="audio-player" src="" preload="auto"></audio>
        </div>
    </div>

    <!-- Song List Column -->
    <div class="col-md-4">
        <div class="card shadow-sm border-0 h-100">
            <div class="card-header bg-white border-bottom py-3 d-flex justify-content-between align-items-center">
                <h5 class="mb-0 fw-bold"><i class="fas fa-list text-success me-2"></i>Available Tracks</h5>
                <span id="track-count" class="badge bg-light text-dark border">0</span>
            </div>
            <div class="card-body p-0" style="max-height: 400px; overflow-y: auto;">
                <ul class="list-group list-group-flush" id="songs-list">
                    <li class="list-group-item text-center py-4 text-muted">
                        <div class="spinner-border spinner-border-sm text-success" role="status"></div> Loading...
                    </li>
                </ul>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<style>
    .song-item {
        cursor: pointer;
        transition: background-color 0.2s;
        border-left: 4px solid transparent;
    }

    .song-item:hover {
        background-color: #f8f9fa;
    }

    .song-item.active {
        background-color: #e8f5e9;
        border-left-color: #1db954;
    }

    .play-btn-bounce:active {
        transform: scale(0.95);
    }

    ::-webkit-scrollbar {
        width: 8px;
    }

    ::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb {
        background: #c1c1c1;
        border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
        background: #a8a8a8;
    }

    /* Custom Range Slider Styling for Progress */
    input[type=range] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        background: transparent;
    }

    input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 16px;
        width: 16px;
        border-radius: 50%;
        background: #fff;
        cursor: pointer;
        margin-top: -6px;
        box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
    }

    input[type=range]::-webkit-slider-runnable-track {
        width: 100%;
        height: 4px;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.3);
        border-radius: 2px;
    }

    input[type=range]:focus {
        outline: none;
    }
</style>

<script>
    let currentGenre = 'All';
    let currentSearch = '';
    let searchTimeout = null;

    document.addEventListener('DOMContentLoaded', () => {
        loadGenres();
        loadSongs();
    });

    let currentSongId = null;
    let currentPlaylist = [];
    const player = document.getElementById('audio-player');
    const playBtn = document.getElementById('play-btn');
    const playIcon = document.getElementById('play-icon');
    const progressBar = document.getElementById('progress-bar');
    const currentTimeDisplay = document.getElementById('current-time');
    const totalTimeDisplay = document.getElementById('total-time');
    const volumeSlider = document.getElementById('volume-slider');
    const muteBtn = document.getElementById('mute-btn');

    // Format seconds into M:SS
    function formatTime(seconds) {
        if (isNaN(seconds)) return "0:00";
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    async function loadGenres() {
        try {
            const genres = await apiCall('songs/genres/');
            const genreSelect = document.getElementById('genreSelect');
            genres.forEach(g => {
                const option = document.createElement('option');
                option.value = g;
                option.textContent = g;
                genreSelect.appendChild(option);
            });
        } catch (error) {
            console.error('Error loading genres:', error);
        }
    }

    function handleSearch() {
        if (searchTimeout) clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            currentGenre = document.getElementById('genreSelect').value;
            currentSearch = document.getElementById('searchInput').value;
            loadSongs();
        }, 300);
    }

    async function loadSongs() {
        try {
            let url = 'songs/?';
            if (currentGenre !== 'All') url += `genre=${encodeURIComponent(currentGenre)}&`;
            if (currentSearch) url += `search=${encodeURIComponent(currentSearch)}`;

            const data = await apiCall(url);
            const container = document.getElementById('songs-list');
            document.getElementById('track-count').textContent = data.length;
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = '<li class="list-group-item p-4 text-center text-muted">No songs found.</li>';
                return;
            }

            currentPlaylist = data; // Save the array of songs for Next/Prev

            data.forEach(song => {
                const li = `
                    <li class="list-group-item song-item d-flex justify-content-between align-items-center py-3" 
                        id="song-${song.id}" 
                        onclick="playSong(${song.id}, '${song.title.replace(/'/g, "\\'")}', '${song.artist.replace(/'/g, "\\'")}', '${song.audio_file_url}')">
                        <div>
                            <h6 class="mb-1 fw-bold text-dark">${song.title}</h6>
                            <small class="text-muted">${song.artist}</small>
                        </div>
                        <div class="text-end">
                            <small class="text-muted d-block text-nowrap"><i class="fas fa-play text-success opacity-50 me-1" style="font-size:0.75rem"></i>${song.play_count}</small>
                            <span class="badge bg-light text-dark border mt-1">${song.genre || 'Music'}</span>
                        </div>
                    </li>
                `;
                container.innerHTML += li;
            });
        } catch (error) {
            document.getElementById('songs-list').innerHTML =
                `<li class="list-group-item text-danger p-3 small"><i class="fas fa-exclamation-circle me-1"></i>Failed to load songs: ${error.message}</li>`;
        }
    }

    async function playSong(id, title, artist, audioUrl) {
        if (!jwtToken) {
            window.location.href = "http://127.0.0.1:8000/login/";
            return;
        }

        currentSongId = id;

        // Update UI
        document.querySelectorAll('.song-item').forEach(el => el.classList.remove('active'));
        const activeItem = document.getElementById(`song-${id}`);
        if (activeItem) activeItem.classList.add('active');

        document.getElementById('now-playing-title').textContent = title;
        document.getElementById('now-playing-artist').textContent = artist;

        playBtn.disabled = false;
        progressBar.disabled = false;

        // Use provided audio URL or fallback
        player.src = audioUrl || 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3';

        try {
            // Hit API to increment play count
            await apiCall(`songs/${id}/stream/`, 'POST');

            // Actually play the audio
            await player.play();
            playIcon.className = 'fas fa-pause text-success';
        } catch (error) {
            console.error('Playback error:', error);
            // Even if API fails (unauthorized), try playing the audio for visual demo purposes
            player.play();
            playIcon.className = 'fas fa-pause text-success';
        }
    }

    // Toggle Play/Pause
    playBtn.addEventListener('click', () => {
        if (player.paused) {
            player.play();
            playIcon.className = 'fas fa-pause text-success ms-1';
        } else {
            player.pause();
            playIcon.className = 'fas fa-play text-success ms-1';
        }
    });

    // Advance to next song when current finishes
    player.addEventListener('ended', playNext);

    // Initial load of duration
    player.addEventListener('loadedmetadata', () => {
        totalTimeDisplay.textContent = formatTime(player.duration);
        progressBar.max = player.duration;
    });

    // Handle user dragging the progress bar
    let isDragging = false;
    progressBar.addEventListener('mousedown', () => isDragging = true);
    progressBar.addEventListener('mouseup', () => {
        isDragging = false;
        player.currentTime = progressBar.value;
    });
    progressBar.addEventListener('input', () => {
        currentTimeDisplay.textContent = formatTime(progressBar.value);
    });

    // Progress Bar Updater
    player.addEventListener('timeupdate', () => {
        if (!isDragging && player.duration) {
            progressBar.value = player.currentTime;
            currentTimeDisplay.textContent = formatTime(player.currentTime);

            // Calculate gradient for nice visualization
            const percentage = (player.currentTime / player.duration) * 100;
            progressBar.style.background = `linear-gradient(to right, #fff ${percentage}%, rgba(255,255,255,0.3) ${percentage}%)`;
        }
    });

    // Skip Functions
    function skipForward() {
        if (player.src && !isNaN(player.duration)) {
            player.currentTime = Math.min(player.currentTime + 10, player.duration);
        }
    }

    function skipBackward() {
        if (player.src) {
            player.currentTime = Math.max(player.currentTime - 10, 0);
        }
    }

    // Next/Prev Functions
    function playNext() {
        if (!currentSongId || currentPlaylist.length === 0) return;
        const currentIndex = currentPlaylist.findIndex(s => s.id === currentSongId);
        if (currentIndex !== -1 && currentIndex < currentPlaylist.length - 1) {
            const nextSong = currentPlaylist[currentIndex + 1];
            playSong(nextSong.id, nextSong.title, nextSong.artist, nextSong.audio_file_url);
        }
    }

    function playPrevious() {
        if (!currentSongId || currentPlaylist.length === 0) return;

        // If we are more than 3 seconds in, restart the current song instead of going to previous
        if (player.currentTime > 3) {
            player.currentTime = 0;
            return;
        }

        const currentIndex = currentPlaylist.findIndex(s => s.id === currentSongId);
        if (currentIndex > 0) {
            const prevSong = currentPlaylist[currentIndex - 1];
            playSong(prevSong.id, prevSong.title, prevSong.artist, prevSong.audio_file_url);
        }
    }

    // Volume Control
    volumeSlider.addEventListener('input', (e) => {
        player.volume = e.target.value;
        player.muted = false;
        updateVolumeIcon(player.volume);
    });

    let prevVolume = 1;
    function toggleMute() {
        if (player.muted || player.volume === 0) {
            player.muted = false;
            player.volume = prevVolume > 0 ? prevVolume : 1;
            volumeSlider.value = player.volume;
        } else {
            prevVolume = player.volume;
            player.muted = true;
            volumeSlider.value = 0;
        }
        updateVolumeIcon(volumeSlider.value);
    }

    function updateVolumeIcon(vol) {
        const icon = muteBtn.querySelector('i');
        if (vol == 0 || player.muted) {
            icon.className = 'fas fa-volume-mute';
        } else if (vol < 0.5) {
            icon.className = 'fas fa-volume-down';
        } else {
            icon.className = 'fas fa-volume-up';
        }
    }

</script>
{% endblock %}
