{% extends 'base.html' %}

{% block content %}
<style>
    .success-card {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        position: relative;
        overflow: hidden;
        animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
        transform: translateY(40px);
    }

    @keyframes slideUpFade {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .success-icon-wrapper {
        width: 120px;
        height: 120px;
        background: rgba(255, 8, 68, 0.1);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0 auto;
        position: relative;
        animation: scaleIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s forwards;
        transform: scale(0);
    }

    .success-icon-wrapper::before {
        content: '';
        position: absolute;
        top: -10px;
        left: -10px;
        right: -10px;
        bottom: -10px;
        border-radius: 50%;
        border: 2px dashed rgba(255, 8, 68, 0.3);
        animation: spin 10s linear infinite;
    }

    @keyframes scaleIn {
        to {
            transform: scale(1);
        }
    }

    @keyframes spin {
        100% {
            transform: rotate(360deg);
        }
    }

    .confetti {
        position: absolute;
        width: 10px;
        height: 10px;
        background-color: #ff0844;
        opacity: 0;
    }
</style>

<div class="row justify-content-center py-5 mt-4" id="confetti-container" style="position: relative;">
    <div class="col-md-7 text-center z-3">
        <div class="success-card shadow-lg p-5">
            <div class="success-icon-wrapper mb-4 text-danger">
                <i class="fas fa-utensils" style="font-size: 4rem;"></i>
            </div>
            <h1 class="fw-bolder mb-3"
                style="background: var(--kitchen-gradient); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                Order Successful!</h1>
            <p class="text-muted fs-5 mb-5 px-md-4">
                Thank you for your order! Your premium dummy payment was processed securely. The kitchen is preparing
                your meal.
            </p>
            <div class="d-flex justify-content-center gap-3 flex-wrap">
                <a href="{% url 'kitchen_orders' %}"
                    class="btn btn-outline-danger rounded-pill px-5 py-2 fw-bold shadow-sm">View Orders</a>
                <a href="{% url 'kitchen_home' %}" class="btn btn-danger rounded-pill px-5 py-2 fw-bold shadow">Back to
                    Menu</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', () => {

        // Premium Success Audio Cue
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) {
                const ctx = new AudioContext();
                const playNote = (freq, startTime, duration, vol) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, ctx.currentTime + startTime);
                    gain.gain.setValueAtTime(0, ctx.currentTime + startTime);
                    gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + startTime + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + startTime + duration);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(ctx.currentTime + startTime);
                    osc.stop(ctx.currentTime + startTime + duration);
                };
                // Play a bright success chord (C5, E5, G5, C6)
                if (ctx.state === 'suspended') {
                    // Try to resume on first interaction just in case autoplay fails
                    document.body.addEventListener('click', () => ctx.resume(), { once: true });
                }
                playNote(523.25, 0, 0.4, 0.2);      // C5
                playNote(659.25, 0.1, 0.4, 0.2);    // E5
                playNote(783.99, 0.2, 0.4, 0.2);    // G5
                playNote(1046.50, 0.3, 0.8, 0.3);   // C6
            }
        } catch(e) { console.log('AudioContext not supported or blocked'); }

        // Simple Confetti Effect tailored for kitchen colors
        const colors = ['#ff0844', '#ffb199', '#fcd000', '#ffdf00'];
        const container = document.getElementById('confetti-container');

        for (let i = 0; i < 50; i++) {
            const conf = document.createElement('div');
            conf.classList.add('confetti');
            conf.style.left = Math.random() * 100 + '%';
            conf.style.top = -10 + 'px';
            conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            conf.style.transform = `rotate(${Math.random() * 360}deg)`;
            container.appendChild(conf);

            const duration = Math.random() * 2 + 2;
            const delay = Math.random() * 1;

            conf.animate([
                { transform: `translate3d(0,0,0) rotate(0deg)`, opacity: 1 },
                { transform: `translate3d(${Math.random() * 100 - 50}px, 600px, 0) rotate(${Math.random() * 720}deg)`, opacity: 0 }
            ], {
                duration: duration * 1000,
                delay: delay * 1000,
                easing: 'cubic-bezier(.37,0,.63,1)',
                fill: 'forwards'
            });
        }
    });
</script>
{% endblock %}
