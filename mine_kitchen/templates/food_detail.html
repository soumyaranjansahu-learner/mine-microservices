{% extends 'base.html' %}

{% block content %}
<div class="row align-items-center mb-4">
    <div class="col-auto">
        <a href="{% url 'kitchen_home' %}" class="btn btn-outline-danger rounded-pill btn-sm fw-bold">
            <i class="fas fa-arrow-left me-2"></i>Back to Menu
        </a>
    </div>
</div>

<div class="card p-4 border-0 shadow-sm rounded-4" id="food-detail-container">
    <div class="text-center w-100 py-5">
        <div class="spinner-border text-danger" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const foodId = "{{ food_id }}";

    document.addEventListener('DOMContentLoaded', () => {
        loadFoodDetail();
    });

    async function loadFoodDetail() {
        try {
            const food = await apiCall(`foods/${foodId}/`);
            const container = document.getElementById('food-detail-container');
            const dummyImage = 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=800&auto=format&fit=crop&q=60';
            const img = food.image_url || dummyImage;

            container.innerHTML = `
                <div class="row">
                    <div class="col-md-5 mb-4 mb-md-0 text-center">
                        <img src="${img}" alt="${food.name}" class="img-fluid rounded-4 shadow-sm" style="max-height: 400px; object-fit: cover;">
                    </div>
                    <div class="col-md-7 d-flex flex-column justify-content-center px-md-5">
                        ${food.category ? `<span class="badge bg-danger fs-6 mb-3 px-3 py-2 rounded-pill align-self-start">${food.category}</span>` : ''}
                        <h2 class="fw-bolder text-dark mb-2">${food.name}</h2>
                        <h3 class="text-danger fw-bolder mb-3">$${food.price}</h3>
                        <h5 class="fw-bold text-dark mt-3 mb-2">Description</h5>
                        <p class="text-muted fs-5 lh-lg mb-4">${food.description}</p>
                        
                        <div class="d-grid mt-auto pt-4 border-top">
                            ${jwtToken ?
                    `<button onclick="addToCart(${food.id})" class="btn btn-danger btn-lg rounded-pill fw-bold">
                                <i class="fas fa-cart-plus me-2"></i> Add to Cart
                            </button>` :
                    `<button onclick="window.location.href='{{ GATEWAY_URL }}/login/'" class="btn btn-outline-danger btn-lg rounded-pill fw-bold">
                                <i class="fas fa-user-lock me-2"></i> Login to Order
                            </button>`}
                        </div>
                    </div>
                </div>
            `;
        } catch (error) {
            document.getElementById('food-detail-container').innerHTML =
                `<div class="alert alert-danger">Failed to load food details: ${error.message}</div>`;
        }
    }

    async function addToCart(id) {
        if (!jwtToken) {
            window.location.href = "{{ GATEWAY_URL }}/login/";
            return;
        }

        try {
            await apiCall('cart/', 'POST', { food_item_id: id, quantity: 1 });
            alert('Item added to kitchen cart!');
        } catch (error) {
            alert('Error adding to cart: ' + error.message);
        }
    }
</script>
{% endblock %}
