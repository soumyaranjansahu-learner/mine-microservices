{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-danger fw-bolder"><i class="fas fa-utensils me-2"></i>Mine Kitchen Menu</h2>
    <span class="badge bg-danger rounded-pill px-3 py-2 fs-6">Microservice 1</span>
</div>

<div class="row mb-4">
    <div class="col-md-5 mb-2">
        <input type="text" id="searchInput" class="form-control rounded-pill border-danger"
            placeholder="Search foods..." oninput="handleSearch()">
    </div>
    <div class="col-md-3 mb-2">
        <select id="categorySelect" class="form-select rounded-pill border-danger text-danger fw-bold"
            onchange="handleSearch()">
            <option value="All">All Categories</option>
        </select>
    </div>
    <div class="col-md-2 mb-2">
        <input type="number" id="minPrice" class="form-control rounded-pill border-danger" placeholder="Min $..."
            oninput="handleSearch()" min="0" step="0.01">
    </div>
    <div class="col-md-2 mb-2">
        <input type="number" id="maxPrice" class="form-control rounded-pill border-danger" placeholder="Max $..."
            oninput="handleSearch()" min="0" step="0.01">
    </div>
</div>


<div class="row" id="foods-container">
    <div class="text-center w-100 py-5">
        <div class="spinner-border text-danger" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let currentCategory = 'All';
    let currentSearch = '';
    let searchTimeout = null;

    document.addEventListener('DOMContentLoaded', () => {
        loadCategories();
        loadFoods();
    });

    async function loadCategories() {
        try {
            const categories = await apiCall('foods/categories/');
            const categorySelect = document.getElementById('categorySelect');
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                categorySelect.appendChild(option);
            });
        } catch (error) {
            console.error('Error loading categories:', error);
        }
    }

    function handleSearch() {
        if (searchTimeout) clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            currentCategory = document.getElementById('categorySelect').value;
            currentSearch = document.getElementById('searchInput').value;
            loadFoods();
        }, 300); // Debounce search
    }

    async function loadFoods() {
        try {
            const minPrice = document.getElementById('minPrice').value;
            const maxPrice = document.getElementById('maxPrice').value;

            let url = 'foods/?';
            if (currentCategory !== 'All') url += `category=${encodeURIComponent(currentCategory)}&`;
            if (currentSearch) url += `search=${encodeURIComponent(currentSearch)}&`;
            if (minPrice) url += `min_price=${encodeURIComponent(minPrice)}&`;
            if (maxPrice) url += `max_price=${encodeURIComponent(maxPrice)}&`;

            const data = await apiCall(url);
            const container = document.getElementById('foods-container');
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = '<div class="col-12"><div class="alert alert-info">No food items available yet. Go to admin to add some!</div></div>';
                return;
            }

            const dummyImage = 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=500&auto=format&fit=crop&q=60';

            data.forEach(item => {
                const img = item.image_url || dummyImage;
                const card = `
                    <div class="col-md-4 mb-4 mt-2">
                        <div class="card h-100 border-0 p-2">
                            <a href="/kitchen/food/${item.id}/" style="text-decoration: none; color: inherit; display: block;">
                                <img src="${img}" class="card-img-top rounded-4 mb-3 shadow-sm" alt="${item.name}" style="height: 220px; object-fit: cover;">
                                <div class="card-body pt-1 px-3">
                                    <h5 class="card-title fw-bold text-dark fs-4 mb-1">${item.name}</h5>
                                    <h6 class="text-danger fw-bolder fs-5 mb-3">$${item.price}</h6>
                                    <p class="card-text text-muted small lh-lg" style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${item.description}</p>
                                </div>
                            </a>
                            <div class="card-footer bg-transparent border-0 pb-3 pt-0 text-center px-4">
                                ${jwtToken ?
                        `<button onclick="addToCart(${item.id})" class="btn btn-danger btn-lg w-100 rounded-pill fs-6 fw-bold">
                                    <i class="fas fa-cart-plus me-2"></i> Add to Cart
                                </button>` :
                        `<button onclick="window.location.href='{{ GATEWAY_URL }}/login/'" class="btn btn-outline-danger btn-lg w-100 rounded-pill fs-6 fw-bold">
                                    <i class="fas fa-user-lock me-2"></i> Login to Order
                                </button>`}
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        } catch (error) {
            document.getElementById('foods-container').innerHTML =
                `<div class="alert alert-danger w-100">Failed to load foods: ${error.message}</div>`;
        }
    }

    async function addToCart(foodId) {
        if (!jwtToken) {
            window.location.href = "{{ GATEWAY_URL }}/login/";
            return;
        }

        try {
            await apiCall('cart/', 'POST', { food_item_id: foodId, quantity: 1 });
            alert('Item added to kitchen cart!');
        } catch (error) {
            alert('Error adding to cart: ' + error.message);
        }
    }
</script>
{% endblock %}
