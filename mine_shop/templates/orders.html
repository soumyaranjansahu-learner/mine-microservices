{% extends 'base.html' %}

{% block content %}
<h2 class="fw-bolder mb-4 text-primary"><i class="fas fa-clipboard-list me-2"></i>My Shop Orders</h2>

<div class="row justify-content-center">
    <div class="col-md-8 mb-4">
        <div id="shop-orders">
            <div class="spinner-border text-primary spinner-border-sm" role="status"></div> Loading...
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (!jwtToken) {
            window.location.href = "https://e836eae639457939-103-210-91-37.serveousercontent.com/login/";
            return;
        }
        loadOrders();
    });

    async function loadOrders() {
        try {
            const data = await apiCall('orders/');
            const container = document.getElementById('shop-orders');

            if (data.length === 0) {
                container.innerHTML = '<div class="alert alert-light border shadow-sm">No past orders.</div>';
                return;
            }

            let html = '';

            data.forEach(order => {
                const date = new Date(order.created_at).toLocaleString();
                const badgeColor = order.status === 'Paid' ? 'bg-success' :
                    (order.status === 'Cancelled' ? 'bg-danger' :
                        (order.status === 'Returned' ? 'bg-info' : 'bg-warning text-dark'));

                let actionButtons = '';
                if (order.status === 'Paid' || order.status === 'Pending') {
                    actionButtons += `<button class="btn btn-sm btn-outline-danger me-2 shadow-sm rounded-pill" onclick="orderAction(${order.id}, 'cancel')"><i class="fas fa-times me-1"></i>Cancel</button>`;
                }
                if (order.status === 'Delivered' || order.status === 'Paid') {
                    actionButtons += `
                        <button class="btn btn-sm btn-outline-warning me-2 shadow-sm rounded-pill" onclick="orderAction(${order.id}, 'return_order')"><i class="fas fa-undo me-1"></i>Return</button>
                        <button class="btn btn-sm btn-outline-info shadow-sm rounded-pill" onclick="orderAction(${order.id}, 'exchange')"><i class="fas fa-exchange-alt me-1"></i>Exchange</button>
                    `;
                }

                html += `
                    <div class="card mb-3 border-0 shadow-sm border-start border-primary border-3 transition-hover">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="fw-bold fs-5">Order #${order.id}</span>
                                <div>
                                    <span class="badge bg-secondary rounded-pill fs-6 me-1"><i class="fas fa-wallet me-1"></i>${order.payment_method || 'Card'}</span>
                                    <span class="badge ${badgeColor} rounded-pill fs-6">${order.status}</span>
                                </div>
                            </div>
                            <h4 class="fw-bolder mb-2 text-primary">$${parseFloat(order.total_amount).toFixed(2)}</h4>
                            <small class="text-muted d-block mb-3"><i class="far fa-clock me-1"></i>${date}</small>
                            <div class="d-flex justify-content-end">
                                ${actionButtons}
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        } catch (error) {
            document.getElementById('shop-orders').innerHTML =
                `<div class="text-danger small">Failed to load orders: ${error.message}</div>`;
        }
    }

    async function orderAction(orderId, action) {
        const actionNames = {
            'cancel': 'cancel',
            'return_order': 'return',
            'exchange': 'exchange'
        };
        if (!confirm(`Are you sure you want to ${actionNames[action]} this order?`)) return;

        try {
            const res = await apiCall(`orders/${orderId}/${action}/`, 'POST');
            alert(res.message || 'Action completed successfully');
            loadOrders(); // reload the UI
        } catch (error) {
            alert(`Error: ${error.message}`);
        }
    }
</script>
<style>
    .transition-hover {
        transition: transform 0.2s;
    }

    .transition-hover:hover {
        transform: translateY(-3px);
    }
</style>
{% endblock %}
