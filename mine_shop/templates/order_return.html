{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-lg rounded-4">
            <div class="card-body p-5">
                <h3 class="fw-bolder text-warning mb-4"><i class="fas fa-undo me-2"></i>Return Order #{{ order_id }}</h3>
                <p class="text-muted mb-4">We're sorry it didn't work out. Please provide the return details below.</p>
                
                <form id="return-form">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Reason for Return</label>
                        <textarea class="form-control border-primary" id="reason" rows="3" required placeholder="Item defective, wrong size, etc."></textarea>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Refund Method Details (UPI or Card No)</label>
                        <input type="text" class="form-control border-primary" id="refund_info" required placeholder="e.g. user@upi or 4111111111111">
                    </div>
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{% url 'shop_orders' %}" class="btn btn-outline-secondary rounded-pill me-md-2">Go Back</a>
                        <button type="submit" class="btn btn-warning rounded-pill fw-bold">Submit Return</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('return-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const reason = document.getElementById('reason').value;
        const refundInfo = document.getElementById('refund_info').value;
        const btn = e.target.querySelector('button[type="submit"]');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Processing...';

        try {
            await apiCall(`orders/{{ order_id }}/return_order/`, 'POST', { 
                reason: reason,
                refund_info: refundInfo
            });
            window.location.href = "{% url 'action_success' 'return_order' %}";
        } catch (error) {
            alert('Failed to return order: ' + error.message);
            btn.disabled = false;
            btn.innerHTML = 'Submit Return';
        }
    });
</script>
{% endblock %}
