{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 50vh;">
    <div class="col-md-6 text-center">
        <div class="card border-0 shadow-lg rounded-4 p-5">
            <i class="fas fa-check-circle text-success mb-4" style="font-size: 5rem;"></i>
            <h2 class="fw-bolder mb-3 text-dark">Order {{ action_text | title }}</h2>
            <p class="text-muted fs-5 mb-4">Your order has been {{ action_text }} successfully. We've recorded your preferences and are processing your request immediately.</p>
            <a href="{% url 'shop_orders' %}" class="btn btn-primary btn-lg rounded-pill fw-bold">Back to My Orders</a>
        </div>
    </div>
</div>
{% endblock %}
