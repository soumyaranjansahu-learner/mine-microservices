{% extends 'base.html' %}

{% block content %}
<div class="row align-items-center mb-4">
    <div class="col-auto">
        <a href="{% url 'shop_home' %}" class="btn btn-outline-primary rounded-pill btn-sm fw-bold">
            <i class="fas fa-arrow-left me-2"></i>Back to Shop
        </a>
    </div>
</div>

<div class="card p-4 border-0 shadow-sm rounded-4" id="product-detail-container">
    <div class="text-center w-100 py-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const productId = {{ product_id }};

    document.addEventListener('DOMContentLoaded', () => {
        loadProductDetail();
    });

    async function loadProductDetail() {
        try {
            const product = await apiCall(`products/${productId}/`);
            const container = document.getElementById('product-detail-container');
            const dummyImage = 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=800&auto=format&fit=crop&q=60';
            const img = product.image_url || dummyImage;

            const stockBadge = product.stock > 0
                ? `<span class="badge bg-success fs-6 mb-3 px-3 py-2 rounded-pill"><i class="fas fa-check-circle me-1"></i> In Stock (${product.stock} available)</span>`
                : `<span class="badge bg-danger fs-6 mb-3 px-3 py-2 rounded-pill"><i class="fas fa-times-circle me-1"></i> Out of Stock</span>`;

            const btnStatus = product.stock > 0 ? '' : 'disabled';
            
            let variantsHtml = '';
            if (product.features && Object.keys(product.features).length > 0) {
                variantsHtml = '<div class="row mb-4" id="product-variants">';
                for (const [key, values] of Object.entries(product.features)) {
                    variantsHtml += `
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold text-dark">${key}</label>
                            <select class="form-select border-primary feature-select" data-feature="${key}">
                                ${values.map(val => `<option value="${val}">${val}</option>`).join('')}
                            </select>
                        </div>
                    `;
                }
                variantsHtml += '</div>';
            }

            container.innerHTML = `
                <div class="row">
                    <div class="col-md-5 mb-4 mb-md-0 text-center">
                        <img src="${img}" alt="${product.name}" class="img-fluid rounded-4 shadow-sm" style="max-height: 400px; object-fit: contain; padding: 20px; background: white;">
                    </div>
                    <div class="col-md-7 d-flex flex-column justify-content-center px-md-5">
                        <h2 class="fw-bolder text-dark mb-2">${product.name}</h2>
                        <h3 class="text-primary fw-bolder mb-3">$${product.price}</h3>
                        ${stockBadge}
                        <h5 class="fw-bold text-dark mt-3 mb-2">Description</h5>
                        <p class="text-muted fs-5 lh-lg mb-4">${product.description}</p>
                        
                        ${variantsHtml}

                        <div class="d-grid mt-auto pt-4 border-top">
                            ${jwtToken ?
                    `<button onclick="addToCart(${product.id})" class="btn ${product.stock > 0 ? 'btn-primary' : 'btn-secondary'} btn-lg rounded-pill fw-bold" ${btnStatus}>
                                <i class="fas fa-cart-plus me-2"></i> Add to Cart
                            </button>` :
                    `<button onclick="window.location.href='{{ GATEWAY_URL }}/login/'" class="btn btn-outline-primary btn-lg rounded-pill fw-bold">
                                <i class="fas fa-user-lock me-2"></i> Login to Buy
                            </button>`}
                        </div>
                    </div>
                </div>
            `;
        } catch (error) {
            document.getElementById('product-detail-container').innerHTML =
                `<div class="alert alert-danger">Failed to load product details: ${error.message}</div>`;
        }
    }

    async function addToCart(id) {
        if (!jwtToken) {
            window.location.href = "{{ GATEWAY_URL }}/login/";
            return;
        }
        
        const selectedFeatures = {};
        document.querySelectorAll('.feature-select').forEach(select => {
            selectedFeatures[select.dataset.feature] = select.value;
        });

        try {
            await apiCall('cart/', 'POST', { 
                product_id: id, 
                quantity: 1, 
                selected_features: selectedFeatures 
            });
            alert('Item added to shop cart!');
        } catch (error) {
            alert('Error adding to cart: ' + error.message);
        }
    }
</script>
{% endblock %}
